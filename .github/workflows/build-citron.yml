name: Build Citron

concurrency:
  group: build-nightly-consolidated-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  check-version:
    name: Check if new version available
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      new_hash: ${{ steps.upstream.outputs.hash_short }}
      new_hash_full: ${{ steps.upstream.outputs.hash_full }}
      branch_name: ${{ steps.branch_check.outputs.branch_name }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check if feature branch exists and get commit hash
        id: branch_check
        run: |
          REPO_URL="https://git.citron-emu.org/Citron/Emulator.git"
          FEATURE="feature/android-game-file-extraction"

          if git ls-remote --heads "$REPO_URL" "$FEATURE" | grep -q "$FEATURE"; then
            BRANCH_NAME="$FEATURE"
            FULL_HASH=$(git ls-remote "$REPO_URL" "$FEATURE" | cut -f1)
            echo "✅ Using feature branch: $BRANCH_NAME"
          else
            BRANCH_NAME="main"
            FULL_HASH=$(git ls-remote "$REPO_URL" HEAD | cut -f1)
            echo "⚠️ Feature branch not found, falling back to: $BRANCH_NAME"
          fi

          SHORT_HASH=$(echo "$FULL_HASH" | cut -c1-7)
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "hash_short=$SHORT_HASH" >> $GITHUB_OUTPUT
          echo "hash_full=$FULL_HASH" >> $GITHUB_OUTPUT

      - name: Get last built version
        id: last_built
        run: |
          LAST_HASH=$(cat LATEST_VERSION 2>/dev/null | tr -d '\n' || echo "none")
          echo "last_hash=$LAST_HASH" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: release_check
        run: |
          if gh release view nightly-android --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.branch_check.outputs.hash_short }}" != "${{ steps.last_built.outputs.last_hash }}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.release_check.outputs.exists }}" != "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: ${{ matrix.name }}
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Android Builds
          - platform: android-standard
            name: "Android (Standard)"
            os: ubuntu-latest
          - platform: android-8elite
            name: "Android (Snapdragon 8 Elite)"
            os: ubuntu-latest
            target: "Lyb"
            model: "8 Elite"

          # Linux Builds
          - platform: linux-x86_64
            name: "Linux (Normal x86_64)"
            os: ubuntu-latest
            container: ghcr.io/pkgforge-dev/archlinux:latest
            artifact_suffix: "_x86_64"
            build_arg: ""
          - platform: linux-v3
            name: "Linux (Optimized x86_64)"
            os: ubuntu-latest
            container: ghcr.io/pkgforge-dev/archlinux:latest
            artifact_suffix: "_v3"
            build_arg: "v3"
          - platform: linux-aarch64
            name: "Linux (aarch64)"
            os: ubuntu-24.04-arm
            container: ghcr.io/pkgforge-dev/archlinux:latest
            artifact_suffix: "_aarch64"
            build_arg: ""

          # macOS Build
          - platform: macos
            name: "macOS (Universal)"
            os: macos-latest

          # Windows Build
          - platform: windows
            name: "Windows (x64)"
            os: windows-latest
            arch: x64

    steps:
      # 1. INITIAL SETUP
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install Git (Linux Container Only)
        if: contains(matrix.platform, 'linux')
        run: pacman -Syu --noconfirm --needed git

      # 2. CLONE SOURCE
      - name: Clone Citron Source Code
        shell: bash
        run: |
          REPO_URL="https://git.citron-emu.org/Citron/Emulator.git"
          
          # Android uses feature branch if it exists, others use main
          if [[ "${{ matrix.platform }}" == android* ]]; then
            BRANCH="${{ needs.check-version.outputs.branch_name }}"
          else
            BRANCH="main"
          fi

          ATTEMPT=0
          MAX_ATTEMPTS=999

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT: Cloning branch $BRANCH..."
            rm -rf citron_source
            
            if git clone --recursive --depth 1 -b "$BRANCH" "$REPO_URL" citron_source; then
              echo "✅ Clone successful."
              exit 0
            fi
            echo "⚠️ Clone failed. Retrying in 15 seconds..."
            sleep 15
          done
          exit 1

      - name: Get Citron Commit Hash
        id: get_hash
        shell: bash
        run: |
          cd citron_source
          echo "git_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 3. PLATFORM-SPECIFIC DEPENDENCIES
      
      # --- ANDROID DEPS ---
      - name: Android Dependencies
        if: startsWith(matrix.platform, 'android')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip curl git cmake build-essential pkg-config zip glslang-tools nasm perl autoconf automake libtool yasm
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Setup JDK 17
        if: startsWith(matrix.platform, 'android') || matrix.platform == 'macos'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses and install NDK
        if: startsWith(matrix.platform, 'android')
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      # --- LINUX DEPS ---
      - name: Linux Dependencies
        if: contains(matrix.platform, 'linux')
        run: |
          mv get-dependencies.sh citron_source/
          mv build-citron.sh citron_source/
          mv package-citron.sh citron_source/
          cd citron_source
          git config --global --add safe.directory "$PWD"
          chmod +x ./get-dependencies.sh
          ./get-dependencies.sh

      # --- MACOS DEPS ---
      - name: macOS Dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install ninja boost catch2 cmake enet fmt ffmpeg glslang hidapi libvpx lld llvm nasm nlohmann-json openal-soft sdl2 molten-vk vulkan-headers vulkan-loader webp lz4 zstd openssl@3 pkg-config libusb opus python@3.12
          cd citron_source
          python3.12 -m venv venv
          source venv/bin/activate
          pip install jsonschema jinja2
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      # --- WINDOWS DEPS ---
      - name: Windows Vulkan SDK
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $vulkan_sdk_url = "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe"
          Invoke-WebRequest -Uri $vulkan_sdk_url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath ".\VulkanSDK-Installer.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          echo "C:\VulkanSDK\1.3.283.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      # 4. PATCHING
      
      # --- 8 ELITE PATCHES ---
      - name: Apply Snapdragon 8 Elite Patches
        if: matrix.platform == 'android-8elite'
        working-directory: ./citron_source
        run: |
          sed -i '/if (!handle) {/,/}/c\    if (!handle) {\n        handle = dlopen("libvulkan.so", RTLD_NOW);\n    }' src/android/app/src/main/jni/native.cpp
          sed -i '/bool IsShaderInt64Supported() const {/a \        const auto driver = GetDriverID();\n        if (driver == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {\n            return false;\n        }' src/video_core/vulkan_common/vulkan_device.h
          sed -i '/bool IsExtShaderAtomicInt64Supported() const {/a \        const auto driver = GetDriverID();\n        if (driver == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {\n            return false;\n        }' src/video_core/vulkan_common/vulkan_device.h
          sed -i '/const auto device_id =/d' src/video_core/vulkan_common/vulkan_device.cpp
          sed -i 's/\bdevice_id\b/properties.properties.deviceID/g' src/video_core/vulkan_common/vulkan_device.cpp
          sed -i 's/if (is_qualcomm) {/if (driver_id == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {/' src/video_core/vulkan_common/vulkan_device.cpp

      # --- MACOS QT AGL PATCH ---
      - name: Patch macOS Qt AGL
        if: matrix.platform == 'macos'
        working-directory: ./citron_source
        run: |
          QT_OPENGL_CMAKE="externals/qt/6.7.3/macos/lib/cmake/Qt6/FindWrapOpenGL.cmake"
          if [ -f "$QT_OPENGL_CMAKE" ]; then
            awk 'NR>=40 && NR<=46 {if(NR==40) print "          set(__opengl_agl_fw_path \"\")"; next}1' "$QT_OPENGL_CMAKE" > "$QT_OPENGL_CMAKE.tmp" && mv "$QT_OPENGL_CMAKE.tmp" "$QT_OPENGL_CMAKE"
          fi

      # 5. BUILD & PACKAGE
      
      # --- ANDROID BUILD ---
      - name: Android Build
        if: startsWith(matrix.platform, 'android')
        run: |
          cmake -B build-android -S citron_source \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-30 -DANDROID_ARM_NEON=ON \
            -DENABLE_QT=OFF -DENABLE_SDL2=OFF -DENABLE_WEB_SERVICE=OFF -DENABLE_OPENSSL=OFF \
            -DCITRON_USE_BUNDLED_VCPKG=ON -DCITRON_USE_BUNDLED_FFMPEG=ON -DCITRON_ENABLE_LTO=ON
          cmake --build build-android --config Release --parallel $(nproc)
          
          cd citron_source/src/android
          chmod +x gradlew
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          
          if [ "${{ matrix.platform }}" == "android-8elite" ]; then
            COUNT="$(git rev-list --count HEAD)"
            APK_NAME="Citron-${COUNT}-Android-${{ matrix.model }}-${{ matrix.target }}"
            ./gradlew assembleMainlineRelease -PCITRON_ANDROID_ARGS="-DENABLE_UPDATE_CHECKER=ON"
            APK_PATH=$(find app/build/outputs/apk -type f -name "*.apk" | head -n 1)
            mkdir -p artifacts
            mv "$APK_PATH" "artifacts/$APK_NAME.apk"
            echo "ARTIFACT_FINAL=citron_source/src/android/artifacts/*.apk" >> $GITHUB_ENV
          else
            ./gradlew assembleMainlineRelease -Pcmake.args="-DENABLE_WEB_SERVICE=OFF -DENABLE_OPENSSL=OFF"
            echo "ARTIFACT_FINAL=citron_source/src/android/app/build/outputs/apk/mainline/release/*.apk" >> $GITHUB_ENV
          fi

      # --- LINUX BUILD ---
      - name: Linux Build
        if: contains(matrix.platform, 'linux')
        working-directory: ./citron_source
        run: |
          NPROC_VAL=$(nproc --all)
          JOBS_VAL=$((NPROC_VAL > 4 ? 4 : NPROC_VAL))
          chmod +x ./build-citron.sh ./package-citron.sh
          JOBS=${JOBS_VAL} DEVEL=true ./build-citron.sh ${{ matrix.build_arg }}
          
          GIT_SHA=$(git rev-parse --short HEAD)
          export APP_VERSION="${GIT_SHA}" VERSION="${GIT_SHA}" DEVEL="true"
          [[ "${{ matrix.platform }}" == "linux-v3" ]] && export ARCH_SUFFIX="_v3"
          ./package-citron.sh
          echo "ARTIFACT_FINAL=citron_source/dist/*" >> $GITHUB_ENV

      # --- MACOS BUILD ---
      - name: macOS Build
        if: matrix.platform == 'macos'
        working-directory: ./citron_source
        run: |
          cmake -B build -S . -G "Ninja" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix openal-soft);$(brew --prefix sdl2)" \
            -DENABLE_QT=ON -DCITRON_ENABLE_LTO=ON -DCITRON_TESTS=OFF \
            -DUSE_DISCORD_PRESENCE=ON -DENABLE_WEB_SERVICE=ON -DENABLE_OPENSSL=ON -DENABLE_SDL2=ON -DCITRON_USE_EXTERNAL_SDL2=OFF
          cmake --build build --config Release
          
          # Packaging logic (identical to your script)
          mkdir -p ../dist
          APP_BUNDLE_PATH=$(find build -name "citron.app" | head -n 1)
          MACDEPLOYQT_PATH="build/externals/qt/6.7.3/macos/bin/macdeployqt"
          QT_LIB_PATH="build/externals/qt/6.7.3/macos/lib"
          "$MACDEPLOYQT_PATH" "$APP_BUNDLE_PATH" -libpath="$QT_LIB_PATH" -verbose=1 -always-overwrite
          
          # Vulkan ICD
          VULKAN_ICD_DIR="$APP_BUNDLE_PATH/Contents/Resources/vulkan/icd.d"
          mkdir -p "$VULKAN_ICD_DIR"
          echo '{"file_format_version": "1.0.0","ICD": {"library_path": "../../../Frameworks/libMoltenVK.dylib","api_version": "1.4.0","is_portability_driver": true}}' > "$VULKAN_ICD_DIR/MoltenVK_icd.json"
          
          # Fix rpaths (Portability logic from original script)
          FRAMEWORKS_PATH="$APP_BUNDLE_PATH/Contents/Frameworks"
          copy_missing_deps() {
            find "$FRAMEWORKS_PATH" -name "*.dylib" -type f | while read -r dylib; do
              otool -L "$dylib" 2>/dev/null | grep -E "^\s+@rpath/" | awk '{print $1}' | sed 's|@rpath/||' | while read -r dep; do
                if [ ! -f "$FRAMEWORKS_PATH/$dep" ]; then
                  HOMEBREW_LIB=$(find /opt/homebrew/lib /opt/homebrew/Cellar /usr/local/lib -name "$dep" 2>/dev/null | head -1)
                  if [ -n "$HOMEBREW_LIB" ]; then cp "$HOMEBREW_LIB" "$FRAMEWORKS_PATH/"; chmod u+w "$FRAMEWORKS_PATH/$dep"; install_name_tool -id "@rpath/$dep" "$FRAMEWORKS_PATH/$dep" 2>/dev/null || true; fi
                fi
              done
            done
          }
          for i in {1..3}; do copy_missing_deps; done
          
          # Codesign and DMG
          chmod -R u+w "$APP_BUNDLE_PATH"
          codesign --force --deep -s - "$APP_BUNDLE_PATH"
          DMG_FILENAME="Citron-macOS-nightly-${{ steps.get_hash.outputs.git_hash }}.dmg"
          hdiutil create -fs HFS+ -srcfolder "$APP_BUNDLE_PATH" -volname "Citron Nightly" "../dist/$DMG_FILENAME"
          echo "ARTIFACT_FINAL=dist/*.dmg" >> $GITHUB_ENV

      # --- WINDOWS BUILD ---
      - name: Windows Build
        if: matrix.platform == 'windows'
        shell: cmd
        working-directory: ./citron_source
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A ${{ matrix.arch }} ^
            -DCITRON_USE_BUNDLED_VCPKG=ON -DCITRON_BUILD_TYPE=Nightly -DCITRON_ENABLE_LTO=ON ^
            -DCITRON_USE_BUNDLED_QT=ON -DENABLE_QT6=ON -DCITRON_TESTS=OFF -DUSE_DISCORD_PRESENCE=ON ^
            -DENABLE_WEB_SERVICE=ON -DENABLE_OPENSSL=ON -DCITRON_USE_AUTO_UPDATER=ON -DCITRON_ENABLE_LIBARCHIVE=ON
          cmake --build build --config Release --parallel

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          mkdir dist
          mkdir temp_package
          Get-ChildItem ".\citron_source\build\bin\Release\" -Recurse | Where-Object { $_.Extension -ne ".pdb" } | ForEach-Object {
            $relativePath = $_.FullName.Replace((Resolve-Path ".\citron_source\build\bin\Release\").Path, "").TrimStart('\')
            $destPath = Join-Path ".\temp_package" $relativePath
            $destDir = Split-Path $destPath -Parent
            if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
            Copy-Item $_.FullName $destPath -Force
          }
          Compress-Archive -Path ".\temp_package\*" -DestinationPath ".\dist\Citron-windows-nightly-${{ steps.get_hash.outputs.git_hash }}-${{ matrix.arch }}.zip"
          echo "ARTIFACT_FINAL=dist/*.zip" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: citron-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_FINAL }}

  release:
    name: Create Consolidated Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: citron-*
          merge-multiple: true
          path: release_files

      - name: Delete old nightly releases
        run: |
          gh release delete nightly-android --cleanup-tag -y || true
          gh release delete nightly-linux --cleanup-tag -y || true
          gh release delete nightly-macos --cleanup-tag -y || true
          gh release delete nightly-windows --cleanup-tag -y || true
          gh release delete "Citron-Nightly" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Multi-Platform Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Citron Nightly: ${{ needs.check-version.outputs.new_hash }}"
          tag_name: "nightly-all"
          prerelease: true
          files: release_files/**/*
          body: |
            **Upstream Commit:** [`${{ needs.check-version.outputs.new_hash }}`](https://git.citron-emu.org/Citron/Emulator/commit/${{ needs.check-version.outputs.new_hash_full }})
            
            **Included Platform Builds:**
            - 🤖 **Android:** Standard & Snapdragon 8 Elite
            - 🐧 **Linux:** x86_64 (Normal/v3) & AArch64 (AppImage/tar.zst)
            - 🍎 **macOS:** Universal DMG (Qt6)
            - 🪟 **Windows:** x64 Zip

      - name: Update LATEST_VERSION
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ needs.check-version.outputs.new_hash }}" > LATEST_VERSION
          git add LATEST_VERSION
          git commit -m "Update LATEST_VERSION to ${{ needs.check-version.outputs.new_hash }} [skip ci]" || exit 0
          git push

      - name: Post to Discord
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
          [ -z "$WEBHOOK_URL" ] && WEBHOOK_URL="https://discord.com/api/webhooks/1428304731809517588/fG7t7MBprKFss5oGcI05DIFM3JdO41Z0juSV_zOfb9K-UTvyI2fd3-Ciwi48npWXYHLb"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/tag/nightly-all"
          
          curl -H "Content-Type: application/json" \
               -d "{\"content\":\"🚀 **Citron Multi-Platform Nightly Update!**\n\n📦 **Version:** \`${{ needs.check-version.outputs.new_hash }}\`\n🔗 **Download:** $DOWNLOAD_URL\n\n✨ Builds completed for Android, Linux, macOS, and Windows.\"}" \
               "$WEBHOOK_URL"
