name: Build Citron (Android)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  check-version:
    name: Check if new version available
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      new_hash: ${{ steps.upstream.outputs.hash_short }}
      new_hash_full: ${{ steps.upstream.outputs.hash_full }}
      branch_name: ${{ steps.branch_check.outputs.branch_name }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Check if feature branch exists and get commit hash
        id: branch_check
        run: |
          REPO_URL="https://git.citron-emu.org/Citron/Emulator.git"
          BRANCH_NAME="main" # We will always build from main for nightly
          FULL_HASH=$(git ls-remote "$REPO_URL" HEAD | cut -f1)
          SHORT_HASH=$(echo "$FULL_HASH" | cut -c1-7)
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "hash_short=$SHORT_HASH" >> $GITHUB_OUTPUT
          echo "hash_full=$FULL_HASH" >> $GITHUB_OUTPUT
      - name: Get upstream commit hash
        id: upstream
        run: echo "hash_short=${{ steps.branch_check.outputs.hash_short }}" >> $GITHUB_OUTPUT && echo "hash_full=${{ steps.branch_check.outputs.hash_full }}" >> $GITHUB_OUTPUT
      - name: Get last built version
        id: last_built
        run: echo "last_hash=$(cat LATEST_VERSION 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT
      - name: Check if release exists
        id: release_check
        run: |
          if gh release view nightly-android --repo "${{ github.repository }}" > /dev/null 2>&1; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.hash_short }}" != "${{ steps.last_built.outputs.last_hash }}" ] || [ "${{ steps.release_check.outputs.exists }}" != "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✅ A new build is required."
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ No changes - skipping build."
          fi

  build-android-standard:
    name: "Build Standard APK for ${{ matrix.abi }}"
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - name: Install Dependencies
        run: sudo apt-get update -y && sudo apt-get install -y wget unzip curl git cmake build-essential pkg-config zip nasm perl autoconf automake libtool yasm
      - name: Clone Fresh Citron Source Code
        run: git clone --recurse-submodules 'https://git.citron-emu.org/Citron/Emulator.git' ./citron_source
      - name: Get Citron Commit Hash
        id: get_hash
        working-directory: ./citron_source
        run: echo "git_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Set up JDK 17, Android SDK, and NDK
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d android-sdk-temp
          mkdir -p android-sdk/cmdline-tools && mv android-sdk-temp/cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
      - name: Configure and Build with CMake
        run: |
          cmake -B build-android -S citron_source -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=${{ matrix.abi }} -DANDROID_PLATFORM=android-30 -DENABLE_LTO=ON
          cmake --build build-android --config Release --parallel $(nproc)
      - name: Build APK with Gradle
        working-directory: ./citron_source/src/android
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          chmod +x gradlew
          ./gradlew assembleMainlineRelease
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: citron-android-nightly-standard-${{ matrix.abi }}
          path: citron_source/src/android/app/build/outputs/apk/mainline/release/*.apk

  build-android-elite:
    name: "Build Patched APK (8 Elite)"
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      git_hash: ${{ steps.get_hash.outputs.git_hash }}
    steps:
      - name: Install Dependencies
        run: sudo apt-get update -y && sudo apt-get install -y wget unzip curl git cmake build-essential pkg-config zip nasm perl autoconf automake libtool yasm
      - name: Clone Fresh Citron Source Code
        run: git clone --recurse-submodules 'https://git.citron-emu.org/Citron/Emulator.git' ./citron_source
      - name: Get Citron Commit Hash
        id: get_hash
        working-directory: ./citron_source
        run: echo "git_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Apply Performance & Stability Patches
        working-directory: ./citron_source
        run: |
          echo "Applying '8 Elite' patches for Qualcomm GPU stability and performance..."
          sed -i '/if (!handle) {/,/}/c\    if (!handle) {\n        handle = dlopen("libvulkan.so", RTLD_NOW);\n    }' src/android/app/src/main/jni/native.cpp
          sed -i '/bool IsShaderInt64Supported() const {/a \        const auto driver = GetDriverID();\n        if (driver == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {\n            return false;\n        }' src/video_core/vulkan_common/vulkan_device.h
          sed -i '/bool IsExtShaderAtomicInt64Supported() const {/a \        const auto driver = GetDriverID();\n        if (driver == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {\n            return false;\n        }' src/video_core/vulkan_common/vulkan_device.h
          sed -i '/const auto device_id =/d' src/video_core/vulkan_common/vulkan_device.cpp
          sed -i 's/\bdevice_id\b/properties.properties.deviceID/g' src/video_core/vulkan_common/vulkan_device.cpp
          sed -i 's/if (is_qualcomm) {/if (driver_id == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {/' src/video_core/vulkan_common/vulkan_device.cpp
      - name: Set up JDK 17, Android SDK, and NDK
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d android-sdk-temp
          mkdir -p android-sdk/cmdline-tools && mv android-sdk-temp/cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
      - name: Configure and Build with CMake
        run: |
          cmake -B build-android -S citron_source -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-30 -DENABLE_LTO=ON
          cmake --build build-android --config Release --parallel $(nproc)
      - name: Build APK with Gradle
        working-directory: ./citron_source/src/android
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          chmod +x gradlew
          ./gradlew assembleMainlineRelease
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: citron-android-nightly-elite-arm64-v8a
          path: citron_source/src/android/app/build/outputs/apk/mainline/release/*.apk

  release-android:
    name: "Release Android Nightly"
    needs: [check-version, build-android-standard, build-android-elite]
    if: needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks
          pattern: citron-android-nightly-*
          merge-multiple: true
      - name: Get version info for release name
        id: version_info
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "GIT_HASH=${{ needs.build-android-elite.outputs.git_hash }}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${{ needs.check-version.outputs.branch_name }}" >> $GITHUB_ENV
      - name: Delete previous nightly release and tag
        run: gh release delete "nightly-android" --repo "${{ github.repository }}" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create new nightly release
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build: (Android Nightly: ${{ env.GIT_HASH }})"
          tag_name: "nightly-android"
          prerelease: true
          files: "apks/**/*.apk"
          body: |
            **Citron Upstream Commit:** [`${{ needs.check-version.outputs.new_hash }}`](https://git.citron-emu.org/Citron/Emulator/commit/${{ needs.check-version.outputs.new_hash_full }})
            This release contains multiple builds from the **${{ env.BRANCH_NAME }}** branch.

            *   **Standard Build (arm64-v8a):** For most modern Android devices.
            *   **Standard Build (x86_64):** For PC emulators, ChromeOS, and WSA.
            *   **Patched 8 Elite Build (arm64-v8a):** Includes performance and stability patches for Qualcomm Adreno GPUs. **Try this if you experience stutters or crashes.**
            ---
            **Build Date:** ${{ env.DATE }}

      - name: Update LATEST_VERSION
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ needs.check-version.outputs.new_hash }}" > LATEST_VERSION
          git add LATEST_VERSION
          git commit -m "Update LATEST_VERSION to ${{ needs.check-version.outputs.new_hash }} [skip ci]" || exit 0
          for i in {1..5}; do git pull --rebase origin main && git push && break || sleep 2; done
      - name: Post to Discord
        if: success()
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/tag/nightly-android"
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
          if [ -z "$WEBHOOK_URL" ]; then
            WEBHOOK_URL="https://discord.com/api/webhooks/1428304731809517588/fG7t7MBprKFss5oGcI05DIFM3JdO41Z0juSV_zOfb9K-UTvyI2fd3-Ciwi48npWXYHLb"
          fi
          curl -H "Content-Type: application/json" \
               -d "{\"content\":\"🤖 **New Android Build Available!**\n\n📦 **Version:** \`${{ env.GIT_HASH }}\`\n📅 **Date:** ${{ env.DATE }}\n\n✨ **Includes Standard and Patched '8 Elite' builds!**\n🔗 **Download:** $DOWNLOAD_URL\"}" \
               "$WEBHOOK_URL"
