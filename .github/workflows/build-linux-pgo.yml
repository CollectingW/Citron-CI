name: Create Citron PGO Toolkit (Portable SDK)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  create-toolkit:
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Install Git and Dependencies
        run: |
          pacman -Syu --noconfirm --needed git wget zip tar zstd file
          wget https://raw.githubusercontent.com/${{ github.repository }}/main/get-dependencies.sh
          chmod +x ./get-dependencies.sh
          ./get-dependencies.sh

      - name: Clone Citron Source
        run: |
          git clone --recursive https://git.citron-emu.org/Citron/Emulator.git citron-source
          cd citron-source
          git config --global --add safe.directory "$PWD"

      - name: Download Portable Build Tools
        run: |
          mkdir -p toolkit/toolchain toolkit/sysroot toolkit/helpers
          # Download Static CMake (Portable)
          wget https://github.com/Kitware/CMake/releases/download/v3.31.3/cmake-3.31.3-linux-x86_64.tar.gz
          tar -xzf cmake-3.31.3-linux-x86_64.tar.gz --strip-components=1 -C toolkit/toolchain/
          # Download Static Ninja (Portable)
          wget https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-linux.zip
          unzip ninja-linux.zip -d toolkit/toolchain/bin/

      - name: Harvest and Sharun GCC
        run: |
          # Use sharun to make the Arch GCC portable
          wget https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/quick-sharun.sh -O quick-sharun
          chmod +x quick-sharun
          ./quick-sharun /usr/bin/gcc /usr/bin/g++ /usr/bin/cc /usr/bin/c++ /usr/bin/as /usr/bin/ld
          
          # Move sharun'd binaries and their libraries into our toolchain
          cp -r AppDir/usr/bin/* toolkit/toolchain/bin/
          cp -r AppDir/usr/lib toolkit/toolchain/
          
          # Harvest Sysroot (headers and target libs)
          mkdir -p toolkit/sysroot/lib toolkit/sysroot/include
          cp -r /usr/include/* toolkit/sysroot/include/
          cp -d /usr/lib/libQt6* /usr/lib/libBoost* /usr/lib/libSDL2* /usr/lib/libfmt* /usr/lib/libenet* /usr/lib/libcrypto* /usr/lib/libssl* toolkit/sysroot/lib/ || true

      - name: Bundle Helper Tools
        run: |
          wget https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/uruntime2appimage.sh -O toolkit/helpers/uruntime2appimage
          wget https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/quick-sharun.sh -O toolkit/helpers/quick-sharun
          chmod +x toolkit/helpers/*

      - name: Prepare Toolkit
        run: |
          wget https://raw.githubusercontent.com/${{ github.repository }}/main/READMEFORPGO.txt -O toolkit/READMEFORPGO.txt
          wget https://raw.githubusercontent.com/${{ github.repository }}/main/Step1_Train.sh -O toolkit/Step1_Train.sh
          wget https://raw.githubusercontent.com/${{ github.repository }}/main/Step2_Finalize.sh -O toolkit/Step2_Finalize.sh
          wget https://raw.githubusercontent.com/${{ github.repository }}/main/package-local.sh -O toolkit/package-local.sh
          chmod +x toolkit/*.sh
          mv citron-source toolkit/

      - name: Create Final ZIP
        run: zip -r Citron-PGO-Toolkit-Linux.zip toolkit/

      - name: Upload Toolkit
        uses: actions/upload-artifact@v4
        with:
          name: Citron-PGO-Toolkit
          path: Citron-PGO-Toolkit-Linux.zip
