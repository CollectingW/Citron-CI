name: Package Citron AppImage
on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          # Run your script to install everything needed to run/bundle Citron
          chmod +x get-dependencies.sh
          ./get-dependencies.sh
          # Install the two specific tools needed for the packaging process itself
          pacman -S --noconfirm strace xorg-xauth

      - name: Run Packaging Script
        env:
          APP_VERSION: ${{ github.run_number }}
          DEVEL: 'true'
        run: |
          chmod +x package.sh
          ./package.sh

      - name: Upload Finished AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Citron-AppImage
          path: dist/*
