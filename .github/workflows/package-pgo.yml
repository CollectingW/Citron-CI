name: Package Citron AppImage
on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          # Added gcc, zsync, enet, libpulse, gamemode, and vulkan-icd-loader
          pacman -S --noconfirm wget git tar zstd qt6-base qt6-translations sed awk \
                                xorg-server-xvfb xorg-xauth strace gcc zsync \
                                enet libpulse gamemode vulkan-icd-loader

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Packaging Script
        env:
          APP_VERSION: ${{ github.run_number }}
          DEVEL: 'true'
        run: |
          chmod +x package.sh
          ./package.sh

      - name: Upload Finished AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Citron-AppImage
          path: dist/*
