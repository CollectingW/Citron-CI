name: Build Citron (macOS)

concurrency:
  group: build-macos-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  check-version:
    name: Check if new version available
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      new_hash: ${{ steps.upstream.outputs.hash_short }}
      new_hash_full: ${{ steps.upstream.outputs.hash_full }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Get upstream commit hash
        id: upstream
        run: |
          REPO_URL="https://git.citron-emu.org/Citron/Emulator.git"
          FULL_HASH=$(git ls-remote "$REPO_URL" HEAD | cut -f1)
          SHORT_HASH=$(echo "$FULL_HASH" | cut -c1-7)
          echo "hash_short=$SHORT_HASH" >> $GITHUB_OUTPUT
          echo "hash_full=$FULL_HASH" >> $GITHUB_OUTPUT
      - name: Get last built version
        id: last_built
        run: |
          LAST_HASH=$(cat LATEST_VERSION_MACOS 2>/dev/null | tr -d '\n' || echo "none")
          echo "last_hash=$LAST_HASH" >> $GITHUB_OUTPUT
      - name: Check if release exists
        id: release_check
        run: |
          if gh release view nightly-macos --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.hash_short }}" != "${{ steps.last_built.outputs.last_hash }}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.release_check.outputs.exists }}" != "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: "Citron Build (macOS)"
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install System Dependencies via Homebrew
        run: |
          brew install dylibbundler ninja boost catch2 cmake enet fmt ffmpeg glslang hidapi libvpx lld llvm mbedtls nasm nlohmann-json openal-soft sdl2 molten-vk vulkan-headers vulkan-loader webp

      - name: Clone Citron Source
        run: git clone --recursive "https://git.citron-emu.org/Citron/Emulator.git" citron

      - name: Patch main.cpp for unused variable
        working-directory: ./citron
        run: |
          sed -i.bak '/constexpr int default_mouse_hide_timeout = 2500;/d' src/citron/main.cpp

      - name: Patch CMakeLists for macOS Compatibility
        working-directory: ./citron
        run: |
          sed -i.bak 's/if (NOT MSVC)/if (NOT MSVC AND NOT APPLE)/g' src/dedicated_room/CMakeLists.txt
          sed -i.bak 's/if (NOT MSVC)/if (NOT MSVC AND NOT APPLE)/g' src/citron/CMakeLists.txt
          sed -i.bak 's/if (NOT MSVC)/if (NOT MSVC AND NOT APPLE)/g' src/citron_cmd/CMakeLists.txt

      - name: Patch AGL in Qt FindWrapOpenGL.cmake
        working-directory: ./citron
        run: |
          QT_OPENGL_CMAKE="externals/qt/6.7.3/macos/lib/cmake/Qt6/FindWrapOpenGL.cmake"
          if [ -f "$QT_OPENGL_CMAKE" ]; then
            awk 'NR>=40 && NR<=46 {if(NR==40) print "          set(__opengl_agl_fw_path \"\")"; next}1' "$QT_OPENGL_CMAKE" > "$QT_OPENGL_CMAKE.tmp" && mv "$QT_OPENGL_CMAKE.tmp" "$QT_OPENGL_CMAKE"
          else
            echo "Warning: $QT_OPENGL_CMAKE not found, skipping AGL patch"
          fi

      - name: Get Nightly Version
        id: version
        working-directory: ./citron
        run: |
          git fetch --tags
          VERSION=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Python 3.12 venv
        working-directory: ./citron
        run: |
          python3.12 -m venv venv
          source venv/bin/activate
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      - name: Configure CMake
        working-directory: ./citron
        run: |
          BREW_PREFIX="$(brew --prefix)"
          LLVM_DIR_BREW="$(brew --prefix llvm)"
          OPENAL_DIR="$(brew --prefix openal-soft)"
          SDL2_DIR="$(brew --prefix sdl2)"
          
          cmake -B build -S . -G "Ninja" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_SKIP_BUILD_RPATH=TRUE \
            -DCITRON_USE_FASTER_LD=OFF \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX;$LLVM_DIR_BREW;$OPENAL_DIR;$SDL2_DIR" \
            -DLLVM_DIR="$LLVM_DIR_BREW/lib/cmake/llvm" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCITRON_USE_BUNDLED_VCPKG=OFF \
            -DBoost_USE_STATIC_LIBS=ON \
            -DCMAKE_FIND_LIBRARY_SUFFIXES=".a" \
            -DENABLE_QT=ON \
            -DCITRON_ENABLE_LTO=ON \
            -DCITRON_TESTS=OFF \
            -DUSE_DISCORD_PRESENCE=ON \
            -DENABLE_WEB_SERVICE=ON \
            -DENABLE_OPENSSL=ON \
            -DCITRON_USE_AUTO_UPDATER=OFF \
            -DENABLE_SDL2=ON \
            -DCITRON_USE_EXTERNAL_SDL2=OFF

      - name: Build Citron
        working-directory: ./citron
        run: cmake --build build --config Release

      - name: Package macOS Build
        run: |
          set -ex # Exit on error and print commands
          
          # --- Basic Setup ---
          mkdir -p dist
          APP_BUNDLE_PATH=$(find citron/build -name "citron.app" | head -n 1)
          if [ -z "$APP_BUNDLE_PATH" ]; then echo "::error::Could not find citron.app bundle!" && exit 1; fi
          FRAMEWORKS_PATH="$APP_BUNDLE_PATH/Contents/Frameworks"
          EXECUTABLE_PATH="$APP_BUNDLE_PATH/Contents/MacOS/citron"

          # --- Step 1: Use macdeployqt for Qt frameworks and plugins ---
          MACDEPLOYQT_PATH=$(find "$PWD/citron/build" -name "macdeployqt" -type f | head -n 1)
          if [ -z "$MACDEPLOYQT_PATH" ]; then echo "::error::Could not find macdeployqt from the build!" && exit 1; fi
          "$MACDEPLOYQT_PATH" "$APP_BUNDLE_PATH" -verbose=1

          # --- Step 2: Use dylibbundler to ADD missing Homebrew libraries ---
          dylibbundler -b -x "$EXECUTABLE_PATH" -d "$FRAMEWORKS_PATH" -p "$(brew --prefix)/lib"

          # --- Step 3: Codesign and Create DMG ---
          echo "Applying ad-hoc signature to the application bundle..."
          codesign --force --deep --sign - "$APP_BUNDLE_PATH"

          echo "Creating final DMG..."
          DMG_FILENAME="Citron-macOS-nightly-${{ steps.version.outputs.VERSION }}.dmg"
          hdiutil create -fs HFS+ -srcfolder "$APP_BUNDLE_PATH" -volname "Citron Nightly" "./dist/$DMG_FILENAME"

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: Citron-macOS-Nightly
          path: "dist/*.dmg"

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "Release (macOS)"
    needs: [check-version, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Citron-macOS-Nightly
          path: .
      - name: Get Version from Filename
        run: |
          FILENAME=$(ls *.dmg)
          VERSION=${FILENAME#Citron-macOS-nightly-}
          VERSION=${VERSION%.dmg}
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Delete Previous Release
        run: gh release delete "nightly-macos" --repo "${{ github.repository }}" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set Build Date
        run: echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (macOS Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-macos"
          prerelease: true
          files: "*.dmg"
          body: |
            **Citron Upstream Commit:** [`${{ needs.check-version.outputs.new_hash }}`](https://git.citron-emu.org/Citron/Emulator/commit/${{ needs.check-version.outputs.new_hash_full }})
            This build is based on the latest Citron emulator source code from the upstream repository.
            **Build Details:**
            - Platform: macOS (Universal)
            - Build Type: Release with Qt6 and LTO
            - Date: ${{ env.BUILD_DATE }}
      - name: Update LATEST_VERSION_MACOS
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ env.APP_VERSION }}" > LATEST_VERSION_MACOS
          git add LATEST_VERSION_MACOS
          git commit -m "Update LATEST_VERSION_MACOS to ${{ env.APP_VERSION }} [skip ci]" || exit 0
          for i in {1..5}; do
            git pull --rebase origin main && git push && break || sleep 2
          done

      - name: Post to Discord
        if: success()
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/tag/nightly-macos"
          DATE=$(date +'%Y-%m-%d')
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
          if [ -z "$WEBHOOK_URL" ]; then
            WEBHOOK_URL="https://discord.com/api/webhooks/1428304731809517588/fG7t7MBprKFss5oGcI05DIFM3JdO41Z0juSV_zOfb9K-UTvyI2fd3-Ciwi48npWXYHLb"
          fi
          curl -H "Content-Type: application/json" \
               -d "{\"content\":\"🍎 **New macOS Build Available!**\n\n📦 **Version:** \`${{ env.APP_VERSION }}\`\n📅 **Date:** ${DATE}\n🔗 **Download:** $DOWNLOAD_URL\"}" \
               "$WEBHOOK_URL"
